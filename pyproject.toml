[tool.mypy]
python_version = "3.12"
strict = true
explicit_package_bases = true
mypy_path = "."
warn_return_any = true
warn_unused_configs = true
# Legacy test files inside scrapping_NSI/ are not part of the main type-check
# scope; they use test patterns (bare functions) that produce no-untyped-def
# noise. Excluding them keeps the strict check focused on production code.
exclude = [
    "scrapping_NSI/test_.*\\.py$",
]

[[tool.mypy.overrides]]
module = "chromadb.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"
pythonpath = ["."]
norecursedirs = [
    ".*",
    "__pycache__",
    "build",
    "dist",
    "*.egg",
    "node_modules",
    "nsi-enseignement",
]

[tool.ruff]
target-version = "py312"
line-length = 100
include = [
    "scrapping_NSI/safe_archive.py",
    "scrapping_NSI/organizer_nsi.py",
    "scrapping_NSI/scraper_eduscol.py",
    "scripts/**/*.py",
    "tests/**/*.py",
]
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "dist",
    "01_build_reports",
    "nsi-enseignement",
]

[tool.ruff.lint]
select = ["E", "F"]
# Les ressources pédagogiques historiques contiennent des tableaux Markdown,
# chemins Drive et messages d'audit longs. E501 est donc désactivé globalement
# pour préserver ces textes; la longueur nominale reste 100 pour le formatage
# et les nouvelles lignes de code.
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["E402"]
"scripts/check_git_clean.py" = ["E402"]
"scripts/check_metadata.py" = ["E402"]
"scripts/check_session_duration_consistency.py" = ["E402"]
"scripts/check_session_level_planning.py" = ["E402"]
"scripts/check_session_monthly_total.py" = ["E402"]
"scripts/check_session_project_hours.py" = ["E402"]
"scripts/rebuild_inventory.py" = ["E402"]
"scripts/build_source_archive.py" = ["E402"]
"scripts/check_archive_portability.py" = ["E402"]
"scripts/run_audit_extracted_source.py" = ["E402"]
"scrapping_NSI/scraper_eduscol.py" = ["E402"]
