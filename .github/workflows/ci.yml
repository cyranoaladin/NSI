name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Tests
        run: pytest

      - name: Freshness gate
        run: |
          python -m scripts.rebuild_inventory
          python -m scripts.check_program_coverage
          python -m scripts.generate_pedagogical_indexes
          python -m scripts.rebuild_inventory
          python -m scripts.check_no_private_data
          git diff --exit-code manifest.csv manifest_tooling.csv inventory_report.md coverage.md coverage_sources.md privacy_report.md

      - name: Audit core (cold — no dist/)
        run: make audit-core

      - name: Audit metrics
        run: make audit-metrics

      - name: Substance adversarial guard
        run: |
          set +e
          python -m scripts.check_substance_anchors substance_reviews/_adversarial/poisoned.verdict.json --repo-root . > /tmp/poisoned_guard.log 2>&1
          status=$?
          cat /tmp/poisoned_guard.log
          test "$status" -eq 1
          grep -q "DÉGRADÉ" /tmp/poisoned_guard.log

      - name: Status promotion guard
        run: python -m scripts.check_status_promotion_guard

      - name: Secret guard
        run: python -m scripts.check_no_committed_secrets
