backend: chroma
api:
  base_url: "https://rag-api.nexusreussite.academy/search"
  auth: bearer
  collection: nsi_corpus
vector:
  distance: cosine
  dimension: 768
embedding:
  model: nomic-embed-text
  base_url_env: EMBEDDING_BASE_URL
llm:
  engine: ollama
  model: qwen2.5:7b
collections:
  nsi_corpus:
    role: "ressources internes produites"
    proof_scope: internal_only
  rag_education:
    role: "sources Drive, ressources externes et inspiration"
    proof_scope: not_internal_coverage
  nsi_official:
    role: "textes officiels"
    proof_scope: reference_only
  nsi_annales:
    role: "sujets publics et annales si licence compatible"
    proof_scope: external_reference
exclusions:
  - "AUDIT/"
  - "dist/"
  - ".git/"
  - "Documents_DRIVE/"
  - "rendus_eleves/"
  - "NotesEleves.csv"
  - "Fichier_Eleves.csv"
metadata_required:
  - path
  - anchor
  - capacities
  - document_type
  - status
  - source_type
