sequence: T03
theme: Structures linéaires et tables associatives
notions_exigibles:
- pile
- file
- dictionnaire
- complexité
capacites_officielles:
- T-STRUCT-03A
exemples_obligatoires:
- 'pile : empiler A puis B, dépiler -> B sort en premier'
- 'file : enfiler A puis B, défiler -> A sort en premier'
- 'dictionnaire : `{"id7": "ok"}` -> `ok`'
- 'complexité : accès par identifiant -> accès attendu constant'
cas_limites:
- pile vide
- file vide
- clé absente
- collision abstraite hors programme
erreurs_frequentes:
- EF1 - Inverser LIFO et FIFO.
- EF2 - Retirer dans une structure vide sans test.
- EF3 - Parcourir tout un dictionnaire pour une clé connue.
- EF4 - Confondre clé et valeur.
types_exercices_attendus:
- pile avec empiler A puis B, dépiler
- file à partir de enfiler A puis B, défiler
- 'dictionnaire avec `{"id7": "ok"}`'
- complexité pour accès par identifiant
- un cas limite lié à pile vide
- deux méthodes possibles pour file
- un transfert qui utilise dictionnaire avec une donnée nouvelle
- un énoncé volontairement erroné sur complexité
tp_attendu: Choisir et implémenter la structure adaptée pour gérer une file de tâches
  et un accès par identifiant.
interdits_pedagogiques:
- réponse cohérente sans calcul
- production vérifiable sans livrable concret
- starter qui retourne directement la réponse
criteres_validation_humaine:
- relecture pédagogique indépendante
- vérification scientifique des exemples
- exécution du TP corrigé
- alignement avec le BO 2019
must_include:
- pile
- empiler A puis B, dépiler
- enfiler A puis B, défiler
- pile vide
- EF1
- Choisir et implémenter la structure adaptée pour gérer une file de tâches et un
  accès par identifiant.
must_not:
- réponse cohérente sans calcul
- production vérifiable sans livrable concret
- starter qui retourne directement la réponse
